<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Aesthetic Landscape Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;700&family=Space+Grotesk:wght@300;700&family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>
    <div class="noise"></div>

    <main class="timer-container">
        <div id="timer-display" class="timer-text">00:00:00</div>
        
        <div class="controls">
            <button id="start-pause-btn" class="control-btn">Start</button>
            <button id="reset-btn" class="control-btn">Reset</button>
            <button id="settings-toggle" class="control-btn icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </main>

    <aside id="settings-panel" class="settings-panel hidden">
        <div class="panel-content">
            <div class="setting-group">
                <h3>Set Timer (Max 12h)</h3>
                <div class="timer-inputs">
                    <input type="number" id="input-h" placeholder="HH" min="0" max="12">
                    <span>:</span>
                    <input type="number" id="input-m" placeholder="MM" min="0" max="59">
                    <span>:</span>
                    <input type="number" id="input-s" placeholder="SS" min="0" max="59">
                </div>
                <button id="set-timer-btn" class="apply-btn">Apply Time</button>
            </div>

            <div class="setting-group">
                <h3>Typography</h3>
                <div class="font-options">
                    <button class="font-btn active" data-font="Outfit">Outfit</button>
                    <button class="font-btn" data-font="Space Grotesk">Space Grotesk</button>
                    <button class="font-btn" data-font="Bebas Neue">Bebas Neue</button>
                    <button class="font-btn" data-font="Cormorant Garamond">Elegant</button>
                </div>
            </div>

            <div class="setting-group">
                <h3>Timer Look</h3>
                <div class="look-options">
                    <button class="look-btn active" data-style="normal">Sharp</button>
                    <button class="look-btn" data-style="blurred">Soft</button>
                    <button class="look-btn" data-style="outlined">Outline</button>
                </div>
            </div>
            
            <button id="close-settings" class="close-btn">Done</button>
        </div>
    </aside>

    <script src="script.js"></script>
</body>
</html>
